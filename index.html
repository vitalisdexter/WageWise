<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color"
content="#0f172a">

<title>WageWise</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="apple-touch-icon"
href="assets/icon-512.png">

</head>

<body>

<div id="app">

<header class="topbar">
<h1>💷 WageWise</h1>
</header>

<main id="content">

<section id="homePage" class="page active">

<div class="card">

<h2>Weekly Calculator</h2>

<label>Basic Pay (£)</label>
<input id="basicPay" type="number" value="549.66">

<label>OT Hours</label>
<input id="otHours" type="number">

<label>OT Rate (£)</label>
<input id="otRate" type="number" value="14.96">

<button onclick="calculatePay()">
Calculate
</button>

</div>

<div class="summary-card">

<h3>Take Home Pay</h3>

<h1 id="netPay">
£0.00
</h1>

</div>

</section>

<section id="historyPage" class="page">

<h2>History</h2>

<div id="historyList"></div>

</section>

<section id="earningsPage" class="page">

<h2>📊 Earnings Dashboard</h2>

<div class="dashboard-grid">

<div class="stat-card">
<h3>Weekly Average</h3>
<p id="weeklyAverage">£0.00</p>
</div>

<div class="stat-card">
<h3>Monthly Earnings</h3>
<p id="monthlyTotal">£0.00</p>
</div>

<div class="stat-card">
<h3>Year To Date</h3>
<p id="yearlyTotal">£0.00</p>
</div>

<div class="stat-card">
<h3>Total Entries</h3>
<p id="entryCount">0</p>
</div>

</div>

<div class="chart-card">
<canvas id="earningsChart"></canvas>
</div>

</section>

<section id="payslipPage" class="page">

<h2>Payslip</h2>

<div id="payslipContainer">

</div>

<button onclick="downloadPDF()">
Export PDF
</button>

</section>

<section id="settingsPage" class="page">

<h2>Settings</h2>

<div class="setting">

<label>

Dark Mode

<input
type="checkbox"
id="themeToggle">

</label>

</div>

<button onclick="clearHistory()">
Clear History
</button>

</section>

</main>

<nav class="bottom-nav">

<button onclick="showPage('homePage')">
🏠
<span>Home</span>
</button>

<button onclick="showPage('historyPage')">
📈
<span>History</span>
</button>

<button onclick="showPage('earningsPage')">
📅
<span>Earnings</span>
</button>

<button onclick="showPage('settingsPage')">
⚙️
<span>Settings</span>
</button>

</nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/storage.js"></script>
<script src="js/calculator.js"></script>
<script src="js/app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>

</html>
